name: Verifies PR are ready for merge

on:
  pull_request:
    branches:
      - main

jobs:
  verify-devcontainer:
    uses: project-origin/.github/.github/workflows/reusable-verify-devcontainer.yaml@3fa16fca8e3a41013342a13d9b71f280f12e750f

  verify-code:
    uses: project-origin/.github/.github/workflows/reusable-verify-code.yaml@3fa16fca8e3a41013342a13d9b71f280f12e750f

  verify-renovate:
    uses: project-origin/.github/.github/workflows/reusable-verify-renovate.yaml@3fa16fca8e3a41013342a13d9b71f280f12e750f

  verify-build-nuget:
    uses: project-origin/.github/.github/workflows/reusable-build-nuget-package.yaml@3fa16fca8e3a41013342a13d9b71f280f12e750f
    with:
      version: 0.0.1
      configuration: Release
      nuget_artifact: nuget-packages
      project: .
