name: Verifies PR are ready for merge

on:
  pull_request:
    branches:
      - main

jobs:
  verify-devcontainer:
    uses: project-origin/.github/.github/workflows/reusable-verify-devcontainer.yaml@7f744ae5d471b54022498939441226bb7f5a2584

  verify-code:
    uses: project-origin/.github/.github/workflows/reusable-verify-code.yaml@7f744ae5d471b54022498939441226bb7f5a2584

  verify-renovate:
    uses: project-origin/.github/.github/workflows/reusable-verify-renovate.yaml@7f744ae5d471b54022498939441226bb7f5a2584

  verify-build-nuget:
    uses: project-origin/.github/.github/workflows/reusable-build-nuget-package.yaml@7f744ae5d471b54022498939441226bb7f5a2584
    with:
      version: 0.0.1
      configuration: Release
      nuget_artifact: nuget-packages
      project: .
